{% extends "base.html" %}

{% block title %}Tags — {{ site.title }}{% endblock %}

{% block content %}
<h1 class="archive-title">Tags</h1>
<ul class="tag-list">
  {% for tag, tag_posts in tags.items() %}
  <li><a href="/tags/{{ tag }}/">{{ tag }}</a> <span class="tag-count">({{ tag_posts|length }})</span></li>
  {% else %}
  <li>No tags yet.</li>
  {% endfor %}
</ul>
{% endblock %}
